[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "daily-report"
version = "0.1.0"
requires-python = ">=3.11,<3.14"

# 运行这个项目需要的依赖
dependencies = [
    "pywin32>=306; sys_platform == 'win32'",
    "psutil>=5.9.0",
    "pyperclip>=1.8.2",
    "openai>=1.0.0",
    "schedule>=1.2.0",
    "pydantic>=2.0.0",
    "PySide6>=6.9,<6.12",
    "PySide6-WebEngine>=6.9,<6.12",
    "qt-material>=2.17",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
daily-report = "daily_report.main:main"
